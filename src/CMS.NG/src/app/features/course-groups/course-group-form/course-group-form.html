<form [formGroup]="form" (ngSubmit)="save()">
  <div class="page">
    <div class="toolbar">
      <span class="title">{{ isEdit() ? '編輯課程群組' : '新增課程群組' }}</span>
      <div class="actions">
        <button
          pButton
          type="button"
          icon="pi pi-times"
          label="取消"
          class="p-button-outlined"
          (click)="cancel()"
        ></button>
        <button
          pButton
          type="submit"
          icon="pi pi-check"
          label="儲存"
          severity="success"
          [disabled]="saving()"
        ></button>
      </div>
    </div>

    <div class="card">
      <h3>課程群組資料</h3>

      <div class="field">
        <label for="description">群組說明 <span class="required">*</span></label>
        <input
          id="description"
          type="text"
          pInputText
          class="full-width"
          formControlName="description"
          placeholder="請輸入群組說明"
        />
        @if (invalid('description')) {
          <small class="error">群組說明為必填</small>
        }
      </div>
    </div>
  </div>
</form>
