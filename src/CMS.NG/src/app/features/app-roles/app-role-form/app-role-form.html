<form [formGroup]="form" (ngSubmit)="save()">
  <div class="page">
    <div class="toolbar">
      <span class="title">{{ isEdit() ? '編輯角色' : '新增角色' }}</span>
      <div class="actions">
        <button
          pButton
          type="button"
          icon="pi pi-times"
          label="取消"
          class="p-button-outlined"
          (click)="cancel()"
        ></button>
        <button
          pButton
          type="submit"
          icon="pi pi-check"
          label="儲存"
          severity="success"
          [disabled]="saving()"
        ></button>
      </div>
    </div>

    <div class="card">
      <h3>角色資料</h3>

      <div class="field">
        <label for="roleId">角色代碼 <span class="required">*</span></label>
        <input
          id="roleId"
          type="text"
          pInputText
          class="full-width"
          formControlName="roleId"
          placeholder="請輸入角色代碼"
        />
        @if (invalid('roleId')) {
          <small class="error">角色代碼為必填</small>
        }
      </div>

      <div class="field">
        <label for="roleName">角色名稱 <span class="required">*</span></label>
        <input
          id="roleName"
          type="text"
          pInputText
          class="full-width"
          formControlName="roleName"
        />
        @if (invalid('roleName')) {
          <small class="error">角色名稱為必填</small>
        }
      </div>

      <div class="field">
        <label for="permissionLevel">權限等級 <span class="required">*</span></label>
        <p-inputNumber
          inputId="permissionLevel"
          styleClass="full-width"
          formControlName="permissionLevel"
          [useGrouping]="false"
        />
        @if (invalid('permissionLevel')) {
          <small class="error">權限等級為必填</small>
        }
      </div>

      <div class="field">
        <label for="description">描述</label>
        <input
          id="description"
          type="text"
          pInputText
          class="full-width"
          formControlName="description"
        />
      </div>
    </div>

    <div class="card">
      <h3>使用者</h3>
      <div class="field">
        <p-multiSelect
          [options]="userOptions()"
          optionLabel="label"
          optionValue="value"
          formControlName="userIds"
          placeholder="選擇使用者（可複選）"
          styleClass="full-width"
          appendTo="body"
          [filter]="true"
          [maxSelectedLabels]="9999"
          display="chip"
        />
      </div>
    </div>
  </div>
</form>
