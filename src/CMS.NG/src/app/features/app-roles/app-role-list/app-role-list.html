<div class="page">
  <div class="toolbar">
    <span class="title">角色 <small>AppRole</small></span>
    <div class="actions">
      <button
        pButton
        type="button"
        icon="pi pi-filter"
        label="篩選"
        class="p-button-outlined"
        (click)="drawerVisible.set(true)"
      ></button>
      <button
        pButton
        type="button"
        icon="pi pi-plus"
        label="新增"
        severity="success"
        (click)="add()"
      ></button>
    </div>
  </div>

  <p-table
    [value]="roles()"
    [loading]="loading()"
    dataKey="roleId"
    [paginator]="true"
    [rows]="pageState.rows"
    [first]="pageState.first"
    [rowsPerPageOptions]="[10, 20, 50]"
    [sortField]="sortState.field"
    [sortOrder]="sortState.order"
    (onPage)="onPage($event)"
    (onSort)="onSort($event)"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="共 {totalRecords} 筆"
    styleClass="p-datatable-sm p-datatable-gridlines"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="roleId">角色代碼 <p-sortIcon field="roleId" /></th>
        <th pSortableColumn="roleName">角色名稱 <p-sortIcon field="roleName" /></th>
        <th pSortableColumn="permissionLevel" style="width: 10rem">
          權限等級 <p-sortIcon field="permissionLevel" />
        </th>
        <th>描述</th>
        <th style="width: 12rem">操作</th>
      </tr>
    </ng-template>

    <ng-template #body let-role>
      <tr>
        <td>{{ role.roleId }}</td>
        <td>{{ role.roleName }}</td>
        <td>{{ role.permissionLevel }}</td>
        <td>{{ role.description }}</td>
        <td>
          <div class="row-actions">
            <button
              pButton
              type="button"
              icon="pi pi-eye"
              class="p-button-text"
              pTooltip="檢視"
              (click)="view(role)"
            ></button>
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-text"
              pTooltip="編輯"
              (click)="edit(role)"
            ></button>
            <button
              pButton
              type="button"
              icon="pi pi-trash"
              class="p-button-text p-button-danger"
              pTooltip="刪除"
              (click)="remove(role)"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="5" class="empty">查無資料</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-drawer [(visible)]="drawerVisible" header="篩選條件" position="right" [style]="{ width: '360px' }">
  <div class="field">
    <label for="f-keyword">關鍵字</label>
    <input
      id="f-keyword"
      type="text"
      pInputText
      class="full-width"
      placeholder="角色代碼 / 角色名稱"
      [(ngModel)]="filters.keyword"
    />
  </div>

  <div class="field">
    <label for="f-level">權限等級</label>
    <p-inputNumber
      inputId="f-level"
      styleClass="full-width"
      [(ngModel)]="filters.permissionLevel"
      [useGrouping]="false"
      placeholder="精確符合"
    />
  </div>

  <div class="drawer-actions">
    <button
      pButton
      type="button"
      label="清除"
      class="p-button-outlined"
      (click)="clearFilters()"
    ></button>
    <button pButton type="button" label="套用" severity="success" (click)="applyFilters()"></button>
  </div>
</p-drawer>
